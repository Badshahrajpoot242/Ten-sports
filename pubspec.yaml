name: live_tv
description: A professional Live TV Streaming application.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # Network & Dynamic Data
  http: ^1.2.0
  
  # Video Streaming (Modern)
  video_player: ^2.8.1
  chewie: ^1.7.2
  
  # Firebase & Ads (Professional Monetization)
  firebase_core: ^3.0.0
  firebase_messaging: ^15.0.0
  google_mobile_ads: ^5.0.0
  
  # Utilities
  url_launcher: ^6.2.5
  fluttertoast: ^8.2.4
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assests/icon/icon.png
